name: Test

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scripts:
    name: Script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: bash -n scripts/fetch-upstream scripts/apply-patches scripts/check-identity scripts/test tests/test-scripts.sh
      - name: Run script tests
        run: ./tests/test-scripts.sh

  patch-apply:
    name: Apply patches
    runs-on: ubuntu-latest
    needs: scripts
    steps:
      - uses: actions/checkout@v4
      - name: Fetch upstream Zed
        run: ./scripts/fetch-upstream
      - name: Apply Zedha patches
        run: ./scripts/apply-patches
      - name: Check Zedha identity
        run: ./scripts/check-identity

  targeted-tests:
    name: Targeted Zedha tests
    runs-on: macos-15
    needs: patch-apply
    steps:
      - uses: actions/checkout@v4
      - name: Fetch upstream Zed
        run: ./scripts/fetch-upstream
      - name: Apply Zedha patches
        run: ./scripts/apply-patches
      - name: Check Zedha identity
        run: ./scripts/check-identity
      - name: Run targeted Zedha tests
        run: ./scripts/test
